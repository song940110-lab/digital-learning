<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系統展示 | AI MeetingDoc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== RESET & BASE ===== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0f14;
        --bg2: #13161e;
        --bg3: #1a1e28;
        --border: rgba(255, 255, 255, 0.08);
        --border2: rgba(255, 255, 255, 0.14);
        --text: #e8eaf0;
        --text2: #8b909e;
        --text3: #555a6a;
        --accent: #4f9eff;
        --accent2: #7b61ff;
        --green: #34d58f;
        --amber: #f5a623;
        --coral: #ff6b6b;
        --teal: #2dd4bf;
        --ch1: #4f9eff;
        --ch2: #2dd4bf;
        --ch3: #f5a623;
        --ch4: #ff6b6b;
        --ch5: #34d58f;
        --font-display: "Noto Serif TC", serif;
        --font-body: "Noto Sans TC", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --r: 10px;
        --r-lg: 16px;
        --transition: 0.25s ease;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }

      a {
        text-decoration: none;
        color: inherit;
      }
      ul {
        list-style: none;
      }

      /* ===== NAVBAR ===== */
      .navbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(13, 15, 20, 0.92);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
      }

      .nav-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
        height: 60px;
        display: flex;
        align-items: center;
        gap: 2rem;
      }

      .nav-logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 1.05rem;
        color: var(--text);
        white-space: nowrap;
      }

      .logo-icon {
        font-size: 1.3rem;
        color: var(--accent);
      }

      /* ===== LAYOUT ===== */
      .chapter-layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        max-width: 1200px;
        margin: 0 auto;
        min-height: calc(100vh - 60px);
      }

      /* ===== SIDEBAR ===== */
      .sidebar {
        position: sticky;
        top: 60px;
        height: calc(100vh - 60px);
        overflow-y: auto;
        border-right: 1px solid var(--border);
        background: var(--bg2);
        padding: 2rem 0;
        display: flex;
        flex-direction: column;
      }

      .sidebar::-webkit-scrollbar {
        width: 4px;
      }
      .sidebar::-webkit-scrollbar-track {
        background: transparent;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 2px;
      }

      .sidebar-header {
        padding: 0 1.5rem 1.5rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 1rem;
      }

      .sidebar-ch {
        display: block;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--ch5);
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 0.3rem;
      }

      .sidebar-title {
        display: block;
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
      }

      .sidebar-nav {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 0 0.75rem;
        gap: 0.15rem;
      }

      .sidebar-link {
        display: flex;
        align-items: center;
        padding: 0.55rem 0.75rem;
        font-size: 0.83rem;
        color: var(--text2);
        border-radius: var(--r);
        transition: all var(--transition);
        position: relative;
      }

      .sidebar-link::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 3px;
        height: 0;
        background: var(--ch5);
        border-radius: 2px;
        transition: height var(--transition);
      }

      .sidebar-link:hover,
      .sidebar-link.active {
        color: var(--text);
        background: var(--bg3);
      }

      .sidebar-link.active::before {
        height: 60%;
      }

      /* Sidebar mobile toggle */
      .sidebar-toggle {
        display: none;
        position: fixed;
        bottom: 1.5rem;
        left: 1.5rem;
        z-index: 200;
        background: var(--ch5);
        color: #0d0f14;
        border: none;
        border-radius: 50%;
        width: 48px;
        height: 48px;
        font-size: 1.2rem;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(52, 213, 143, 0.4);
      }

      @media (max-width: 900px) {
        .chapter-layout {
          grid-template-columns: 1fr;
        }
        .sidebar {
          position: fixed;
          top: 60px;
          left: -280px;
          z-index: 150;
          width: 260px;
          transition: left 0.3s ease;
          box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
        }
        .sidebar.open {
          left: 0;
        }
        .sidebar-toggle {
          display: flex;
          align-items: center;
          justify-content: center;
        }
      }

      /* ===== MAIN CONTENT ===== */
      .chapter-main {
        padding: 0;
        max-width: 820px;
        width: 100%;
      }

      /* ===== CHAPTER HERO ===== */
      .chapter-hero {
        padding: 3.5rem 3rem 2.5rem;
        border-bottom: 1px solid var(--border);
        position: relative;
        overflow: hidden;
        background: linear-gradient(
          135deg,
          var(--bg2),
          rgba(52, 213, 143, 0.05)
        );
      }

      .chapter-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 60% 80% at 90% 50%,
          rgba(52, 213, 143, 0.06) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .ch-badge {
        display: inline-block;
        padding: 0.25rem 0.8rem;
        border: 1px solid;
        border-radius: 99px;
        font-size: 0.72rem;
        font-weight: 600;
        font-family: var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 1rem;
      }

      .ch-title {
        font-family: var(--font-display);
        font-size: clamp(1.8rem, 3vw, 2.6rem);
        font-weight: 900;
        color: var(--text);
        line-height: 1.2;
        margin-bottom: 0.75rem;
      }

      .ch-desc {
        font-size: 0.95rem;
        color: var(--text2);
        line-height: 1.8;
        max-width: 600px;
        margin-bottom: 1.5rem;
      }

      /* ===== CONTENT SECTIONS ===== */
      .content-section {
        padding: 2.5rem 3rem;
      }

      /* ===== DEMO PANEL ===== */
      .demo-panel {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 2rem;
        margin: 0 0 2rem 0;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      }

      .demo-form-group {
        margin-bottom: 1.5rem;
      }

      .demo-form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text2);
        margin-bottom: 0.6rem;
      }

      .demo-select,
      .demo-file-input,
      .demo-textarea {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border2);
        color: var(--text);
        padding: 0.75rem 1rem;
        border-radius: var(--r);
        font-family: var(--font-body);
        font-size: 0.9rem;
        transition: border-color var(--transition);
      }

      .demo-select:focus,
      .demo-file-input:focus,
      .demo-textarea:focus {
        outline: none;
        border-color: var(--ch5);
      }

      .demo-textarea {
        resize: vertical;
        min-height: 80px;
      }

      .demo-radio-group {
        display: flex;
        gap: 1.5rem;
        background: var(--bg);
        padding: 0.75rem 1rem;
        border-radius: var(--r);
        border: 1px solid var(--border2);
      }

      .demo-radio-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        color: var(--text);
        cursor: pointer;
      }

      .demo-radio-label input[type="radio"] {
        accent-color: var(--ch5);
        cursor: pointer;
      }

      .btn-primary {
        background: var(--ch5);
        color: #0d0f14;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.85rem 1.4rem;
        border-radius: var(--r);
        font-size: 1rem;
        font-weight: 600;
        font-family: var(--font-body);
        cursor: pointer;
        transition: all var(--transition);
        border: none;
        width: 100%;
        justify-content: center;
        margin-top: 0.5rem;
      }

      .btn-primary:hover {
        background: #4debb0;
        transform: translateY(-1px);
      }

      .demo-result-box {
        margin-top: 1.5rem;
        padding: 1.5rem;
        background: var(--bg);
        border: 1px dashed var(--ch5);
        border-radius: var(--r);
        display: none;
      }

      .demo-result-box.active {
        display: block;
        animation: fadeIn 0.3s ease;
      }

      .demo-loader {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--ch5);
        font-family: var(--font-mono);
        font-size: 0.9rem;
      }

      .custom-file-button {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border2);
        color: var(--text2);
        padding: 1rem 1.2rem;
        border-radius: var(--r);
        font-family: var(--font-body);
        font-size: 0.9rem;
        cursor: pointer;
        transition: all var(--transition);
      }

      .custom-file-button:hover {
        border-color: var(--ch5);
        background: rgba(52, 213, 143, 0.05);
        color: var(--text);
      }

      .custom-file-button.has-file {
        border-style: solid;
        border-color: var(--ch5);
        color: var(--text);
        background: rgba(52, 213, 143, 0.08);
      }

      .file-icon {
        font-size: 1.2rem;
      }

      /* ===== FOOTER ===== */
      .footer {
        border-top: 1px solid var(--border);
        padding: 2rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      .footer-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .footer-logo {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text2);
      }

      .footer-copy {
        font-size: 0.78rem;
        color: var(--text3);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 640px) {
        .content-section {
          padding: 2rem 1.5rem;
        }
        .chapter-hero {
          padding: 2.5rem 1.5rem 2rem;
        }
      }
    </style>
  </head>
  <body>

    <nav class="navbar">
      <div class="nav-inner">
        <a href="#" class="nav-logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">AI MeetingDoc</span>
        </a>
      </div>
    </nav>

    <div class="chapter-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-ch">Live Demo</span>
          <span class="sidebar-title">系統展示</span>
        </div>
        <nav class="sidebar-nav">
          <a href="#demo" class="sidebar-link active">✨ 互動生成測試區</a>
        </nav>
      </aside>

      <main class="chapter-main" id="mainContent">
        <div class="chapter-hero">
          <div
            class="ch-badge"
            style="
              color: var(--ch5);
              border-color: rgba(52, 213, 143, 0.3);
              background: rgba(52, 213, 143, 0.08);
            "
          >
            Live Demo
          </div>
          <h1 class="ch-title">AI 會議紀錄自動化系統</h1>
          <p class="ch-desc">
            請上傳您的會議語音檔或逐字稿，結合 RAG 動態字典校正，系統將使用多階段 Agent 自動為您生成專業的結構化 Word 會議報告。
          </p>
        </div>

        <section class="content-section" id="demo">
          <div class="demo-panel">
            
            <div class="demo-form-group">
              <label>1. 會議情境模式 (ScenarioMode)</label>
              <select id="scenarioMode" class="demo-select">
                <option value="專案規劃">專案規劃</option>
                <option value="技術開發">技術開發</option>
                <option value="學術研討">學術研討</option>
                <option value="企業商務">企業商務</option>
              </select>
            </div>

            <div class="demo-form-group">
              <label>2. 專有名詞校正字典 (RAG，選填)</label>
              <textarea id="glossaryInput" class="demo-textarea" placeholder="例如：林教授, OpenAI, 興富康工業... 用逗號隔開以提升 AI 辨識準確度"></textarea>
            </div>

            <div class="demo-form-group">
              <label>3. 輸入來源格式</label>
              <div class="demo-radio-group">
                <label class="demo-radio-label">
                  <input type="radio" name="inputType" value="audio" checked /> 🎙
                  錄音檔 (.mp3, .m4a)
                </label>
                <label class="demo-radio-label">
                  <input type="radio" name="inputType" value="text" /> 📝 逐字稿
                  (.txt)
                </label>
              </div>
            </div>

            <div class="demo-form-group">
              <label>4. 上傳檔案</label>
              <div class="custom-file-wrapper">
                <input
                  type="file"
                  id="fileInput"
                  accept=".mp3,.m4a,.wav"
                  style="display: none"
                />

                <label for="fileInput" id="fileLabel" class="custom-file-button">
                  <span class="file-icon">📁</span>
                  <span id="fileName">點擊選擇檔案 (或將檔案拖曳至此)</span>
                </label>
              </div>
            </div>

            <button id="generateBtn" class="btn btn-primary demo-submit-btn">
              🚀 傳送至後端生成會議紀錄
            </button>

            <div id="resultBox" class="demo-result-box">
              <div id="loader" class="demo-loader">
                <span class="spinner" style="display:inline-block; animation: spin 2s infinite linear;">⏳</span> 
                <span>正在分析語音並利用 GPT 生成結構化報告，請稍候...</span>
              </div>
              <div
                id="resultContent"
                style="
                  display: none;
                  color: var(--text2);
                  font-size: 0.9rem;
                  line-height: 1.8;
                "
              >
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <footer class="footer">
      <div class="footer-inner">
        <span class="footer-logo">⬡ AI MeetingDoc</span>
        <span class="footer-copy">AI 會議紀錄自動化生成系統</span>
      </div>
    </footer>

    <button class="sidebar-toggle" id="sidebarToggle" aria-label="開啟側邊欄">
      ☰
    </button>

    <script>
      // Sidebar mobile toggle
      document.getElementById("sidebarToggle").addEventListener("click", () => {
        document.getElementById("sidebar").classList.toggle("open");
      });

      // ===== Demo Panel 互動邏輯 =====
      const inputTypeRadios = document.querySelectorAll('input[name="inputType"]');
      const fileInput = document.getElementById("fileInput");
      const generateBtn = document.getElementById("generateBtn");
      const resultBox = document.getElementById("resultBox");
      const loader = document.getElementById("loader");
      const resultContent = document.getElementById("resultContent");

      // 動態切換上傳檔案的限制類型
      inputTypeRadios.forEach((radio) => {
        radio.addEventListener("change", (e) => {
          if (e.target.value === "audio") {
            fileInput.accept = ".mp3,.m4a,.wav";
          } else {
            fileInput.accept = ".txt";
          }
        });
      });

      const fileNameDisplay = document.getElementById("fileName");
      const fileLabel = document.getElementById("fileLabel");

      fileInput.addEventListener("change", function () {
        if (this.files && this.files.length > 0) {
          fileNameDisplay.textContent = this.files[0].name;
          fileLabel.classList.add("has-file");
        } else {
          fileNameDisplay.textContent = "點擊選擇檔案 (或將檔案拖曳至此)";
          fileLabel.classList.remove("has-file");
        }
      });

      // 點擊送出至 API
      generateBtn.addEventListener("click", async () => {
        if (!fileInput.files.length) {
          alert("請先選擇要上傳的檔案！");
          return;
        }

        const file = fileInput.files[0];
        const scenarioMode = document.getElementById("scenarioMode").value;
        const glossary = document.getElementById("glossaryInput").value;

        // 1. 顯示 Loading
        resultBox.classList.add("active");
        loader.style.display = "flex";
        resultContent.style.display = "none";
        generateBtn.disabled = true;
        generateBtn.style.opacity = "0.5";

        // 2. 準備 FormData
        const formData = new FormData();
        formData.append("File", file);
        formData.append("ScenarioMode", scenarioMode);
        if (glossary.trim() !== '') {
            formData.append("Glossary", glossary);
        }

        try {
          // ⚠️ 注意：記得將 localhost 的 Port 改成你實際執行 .NET 後端時的 Port
          const response = await fetch(
            "https://localhost:7294/api/Meeting/process",
            {
              method: "POST",
              body: formData,
            },
          );

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(
              errorData.Message || `伺服器處理錯誤 (狀態碼: ${response.status})`
            );
          }

          // 4. 解析回傳的 Word 二進位檔案
          const blob = await response.blob();
          const downloadUrl = window.URL.createObjectURL(blob);

          // 嘗試抓取後端檔名
          let filename = `AI_會議紀錄報告_${new Date().getTime()}.docx`;
          const disposition = response.headers.get("Content-Disposition");

          if (disposition && disposition.includes("attachment")) {
            if (disposition.includes("filename*=")) {
              const utf8Filename = disposition.split("filename*=UTF-8''")[1].split(";")[0];
              filename = decodeURIComponent(utf8Filename);
            } else {
              const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
              const matches = filenameRegex.exec(disposition);
              if (matches != null && matches[1]) {
                filename = decodeURIComponent(matches[1].replace(/['"]/g, ""));
              }
            }
          }

          // 5. 隱藏 Loader，顯示成功結果
          loader.style.display = "none";
          resultContent.style.display = "block";

          resultContent.innerHTML = `
            <strong style="color: var(--text); display: block; margin-bottom: 0.5rem;">✅ 會議紀錄生成成功！</strong>
            <p style="margin-bottom: 1rem;">檔案已準備就緒：<strong>${filename}</strong></p>
            <a href="${downloadUrl}" download="${filename}" class="btn btn-primary" style="margin-top:0;">📥 下載 Word 報告</a>
          `;

          // 自動觸發下載
          const a = document.createElement('a');
          a.href = downloadUrl;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

        } catch (error) {
          console.error("API 呼叫失敗:", error);
          loader.style.display = "none";
          resultContent.style.display = "block";
          resultContent.innerHTML = `
            <strong style="color: var(--coral); display: block;">❌ 生成失敗</strong>
            <p>${error.message}</p>
            <p style="font-size: 0.8rem; margin-top: 0.5rem; color: var(--text3);">請確認 .NET 伺服器是否已啟動，並檢查 API 網址與 Port 是否正確。</p>
          `;
        } finally {
          generateBtn.disabled = false;
          generateBtn.style.opacity = "1";
        }
      });
    </script>
  </body>
</html>
